<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Wallpaper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wallpaper">
    <div class="wallpaper__glow" aria-hidden="true"></div>

    <section class="hero">
      <div class="hero__mark" aria-hidden="true">
        <svg viewBox="0 0 98 96" width="72" height="72" fill="currentColor">
          <path fill-rule="evenodd" clip-rule="evenodd"
            d="M48.854 0C21.839 0 0 22 0 49.217c0 21.756 13.993 40.217 33.405 46.69 2.427.49 3.316-1.059 3.316-2.362 0-1.141-.08-5.052-.08-9.127-13.59 2.934-16.42-5.867-16.42-5.867-2.184-5.704-5.342-7.222-5.342-7.222-4.373-2.984.332-2.924.332-2.924 4.853.322 7.523 5.171 7.523 5.171 4.242 7.289 11.128 5.176 13.867 3.962.404-3.096 1.699-5.176 3.093-6.366-10.226-1.22-20.923-5.575-20.923-24.75 0-5.466 1.949-9.93 5.125-13.426-1.062-2.708-4.688-12.662-5.125-13.426 0 0 4.125-1.304 13.426 5.125 3.894-1.062 8.227-1.593 12.478-1.593 4.251 0 8.584.531 12.478 1.593 9.301-6.429 13.426-5.125 13.426-5.125.437-.764 4.063-16.089 5.125-13.426 3.176 3.496 5.125 7.96 5.125 13.426 0 19.175-10.698 23.53-20.924 24.75 1.643 1.468 3.106 4.343 3.106 8.782 0 6.354-.08 11.485-.08 13.043 0 1.304 1.304 2.853 3.316 2.364 19.412-6.473 33.405-24.934 33.405-46.691C97.707 22 75.868 0 48.854 0z" />
        </svg>
      </div>

      <h1 class="hero__title">GitHub Wallpaper</h1>
      <p class="hero__subtitle">Динамические обои с активностью ваших репозиториев</p>

      <div class="hero__hint">
        <span class="hero__hint-dot" aria-hidden="true"></span>
        <span>Добавьте репозитории через иконку в трее → <strong>Настройки</strong></span>
      </div>
    </section>
  </main>

  <div class="pause-overlay" id="pause-overlay" hidden>
    <p>Обои на паузе</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
