name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'pull_request'
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = "1.0.0-pr.${{ github.run_number }}"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Building version $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src -r win-x64

      - name: Build
        run: dotnet build src -c Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Publish (smoke test)
        run: dotnet publish src -c Release -p:PublishProfile=win-x64 --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Verify portable exe
        shell: pwsh
        run: |
          $exe = Get-Item publish/GitHubWallpaper.exe
          if ($exe.Length -lt 1MB) { throw "Published exe is unexpectedly small." }
          $expected = "${{ steps.version.outputs.version }}"
          $productVersion = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exe.FullName).ProductVersion
          Write-Host "GitHubWallpaper.exe size: $([math]::Round($exe.Length / 1MB, 2)) MB"
          Write-Host "Product version: $productVersion"
          if ($productVersion -notlike "$expected*") {
            throw "Expected product version to start with '$expected', got '$productVersion'."
          }

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: pwsh
        run: |
          $version = "1.0.${{ github.run_number }}"
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "Build version $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish single-file exe
        run: dotnet publish src -c Release -p:PublishProfile=win-x64 -p:Version=${{ steps.version.outputs.version }}

      - name: Write version.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          @{
            version = $version
            publishedAt = (Get-Date).ToUniversalTime().ToString("o")
            downloadUrl = "https://github.com/rkfsociety/GitHubWallpaper/releases/download/latest/GitHubWallpaper.exe"
          } | ConvertTo-Json | Set-Content publish/version.json -Encoding utf8

      - name: Verify portable exe
        shell: pwsh
        run: |
          $exe = Get-Item publish/GitHubWallpaper.exe
          if ($exe.Length -lt 1MB) { throw "Published exe is unexpectedly small." }
          if (Test-Path publish/wwwroot) {
            throw "wwwroot must be embedded in single-file exe, not shipped as a loose folder."
          }
          $expected = "${{ steps.version.outputs.version }}"
          $productVersion = [System.Diagnostics.FileVersionInfo]::GetVersionInfo($exe.FullName).ProductVersion
          Write-Host "GitHubWallpaper.exe size: $([math]::Round($exe.Length / 1MB, 2)) MB"
          Write-Host "Product version: $productVersion"
          if ($productVersion -notlike "$expected*") {
            throw "Expected product version to start with '$expected', got '$productVersion'."
          }

      - name: Recreate latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "latest"
          $sha = "${{ github.sha }}"
          $version = "${{ steps.version.outputs.version }}"
          $shortSha = $sha.Substring(0, 7)
          $notes = @"
          ## GitHubWallpaper

          Сборка **$version** ($shortSha).

          Portable single-file exe для Windows 10/11 (self-contained, .NET не требуется).

          Требуется [WebView2 Runtime](https://developer.microsoft.com/microsoft-edge/webview2/).
          "@.Trim()

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Deleting release $tag (and tag) before recreate"
            gh release delete $tag --yes --cleanup-tag
            if ($LASTEXITCODE -ne 0) { throw "gh release delete failed" }
          }

          gh release create $tag publish/GitHubWallpaper.exe publish/version.json `
            --target $sha `
            --title "GitHubWallpaper $version" `
            --notes $notes `
            --latest
          if ($LASTEXITCODE -ne 0) { throw "gh release create failed" }

          # Удалить старые релизы с версионными тегами v1.0.*
          $oldTags = gh release list --limit 100 --json tagName -q ".[].tagName" |
            Where-Object { $_ -match '^v1\.0\.\d+$' }
          foreach ($oldTag in $oldTags) {
            Write-Host "Removing old release $oldTag"
            gh release delete $oldTag --yes --cleanup-tag
          }

  test-v2:
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libopengl0 libfontconfig1 \
            libdbus-1-3 libglib2.0-0 xvfb

      - name: Install package and test tools
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a python -m unittest discover -s tests -p "test_*.py"
          else
            python -m unittest discover -s tests -p "test_*.py"
          fi

  build-v2:
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libopengl0 libfontconfig1 \
            libdbus-1-3 libglib2.0-0

      - name: Install package and PyInstaller
        run: python -m pip install -e ".[dev]"

      - name: Build portable archive
        run: python scripts/build_release.py --output-dir publish

      - name: Verify build artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f publish/GitHubWallpaper-Win-x64.zip
            ls -lh publish/GitHubWallpaper-Win-x64.zip
          else
            test -f publish/GitHubWallpaper-linux-x64.tar.gz
            ls -lh publish/GitHubWallpaper-linux-x64.tar.gz
          fi

  release-v2-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="2.0.${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version $VERSION"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libopengl0 libfontconfig1 \
            libdbus-1-3 libglib2.0-0

      - name: Install package and PyInstaller
        run: python -m pip install -e ".[dev]"

      - name: Build portable archive
        env:
          GITHUB_WALLPAPER_VERSION: ${{ steps.version.outputs.version }}
        run: python scripts/build_release.py --output-dir publish

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: v2-${{ matrix.os }}
          path: python/publish/
          if-no-files-found: error

  release-v2-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release-v2-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="2.0.${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -name 'GitHubWallpaper-Win-x64.zip' -exec cp {} release/ \;
          find artifacts -name 'GitHubWallpaper-linux-x64.tar.gz' -exec cp {} release/ \;
          cat > release/version.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "publishedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "releaseTag": "v2.0-beta",
            "windowsDownloadUrl": "https://github.com/rkfsociety/GitHubWallpaper/releases/download/v2.0-beta/GitHubWallpaper-Win-x64.zip",
            "linuxDownloadUrl": "https://github.com/rkfsociety/GitHubWallpaper/releases/download/v2.0-beta/GitHubWallpaper-linux-x64.tar.gz"
          }
          EOF

      - name: Recreate v2.0-beta pre-release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="v2.0-beta"
          SHA="${{ github.sha }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${SHA:0:7}"
          NOTES=$(cat <<EOF
          ## GitHubWallpaper v2.0 (beta)

          Сборка **${VERSION}** (${SHORT_SHA}).

          - Windows: \`GitHubWallpaper-Win-x64.zip\` (распакуйте и запустите \`GitHubWallpaper.exe\`)
          - Linux: \`GitHubWallpaper-linux-x64.tar.gz\` (распакуйте и запустите \`GitHubWallpaper\`)

          Pre-release v2.0; релиз C# v1.0 остаётся на теге \`latest\`.
          EOF
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting release $TAG before recreate"
            gh release delete "$TAG" --yes --cleanup-tag
          fi

          gh release create "$TAG" \
            release/GitHubWallpaper-Win-x64.zip \
            release/GitHubWallpaper-linux-x64.tar.gz \
            release/version.json \
            --target "$SHA" \
            --title "GitHubWallpaper v2.0-beta ${VERSION}" \
            --notes "$NOTES" \
            --prerelease
