name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y \
            libxcb-cursor-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libopengl0 libfontconfig1 \
            libdbus-1-3 libglib2.0-0 xvfb

      - name: Install package and test tools
        run: python -m pip install -e ".[dev]"

      - name: Run unit tests
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a python -m unittest discover -s tests -p "test_*.py"
          else
            python -m unittest discover -s tests -p "test_*.py"
          fi

  build:
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi
          $SUDO apt-get update
          $SUDO apt-get install -y \
            libxcb-cursor-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libopengl0 libfontconfig1 \
            libdbus-1-3 libglib2.0-0

      - name: Install package and PyInstaller
        run: python -m pip install -e ".[dev]"

      - name: Build portable archive
        run: python scripts/build_release.py --output-dir publish

      - name: Verify build artifact
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            test -f publish/GitHubWallpaper.exe
            test -f publish/GitHubWallpaper-Win-x64.zip
            ls -lh publish/GitHubWallpaper.exe publish/GitHubWallpaper-Win-x64.zip
          else
            test -f publish/GitHubWallpaper
            test -f publish/GitHubWallpaper-linux-x64.tar.gz
            ls -lh publish/GitHubWallpaper publish/GitHubWallpaper-linux-x64.tar.gz
          fi

  release-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container != 'none' && matrix.container || null }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        container: [ubuntu:20.04, none]
        exclude:
          - os: windows-latest
            container: ubuntu:20.04
          - os: ubuntu-latest
            container: none

    defaults:
      run:
        working-directory: python

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="2.0.${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Build version $VERSION"

      - name: Setup Python
        if: matrix.container == 'none'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux build dependencies
        if: matrix.container != 'none'
        run: |
          apt-get update
          apt-get install -y software-properties-common
          add-apt-repository -y ppa:deadsnakes/ppa
          apt-get update
          apt-get install -y \
            python3.11 python3.11-venv python3.11-dev \
            libxcb-cursor-dev libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-render-util0 libxcb-shape0 libxcb-xfixes0 libxcb-xinerama0 \
            libxkbcommon-x11-0 libegl1 libopengl0 libfontconfig1 \
            libdbus-1-3 libglib2.0-0
          python3.11 -m pip install --upgrade pip

      - name: Install package and PyInstaller
        shell: bash
        run: |
          if [ "${{ matrix.container }}" != "none" ]; then
            python3.11 -m pip install -e ".[dev]"
          else
            python -m pip install -e ".[dev]"
          fi

      - name: Build portable archive
        shell: bash
        env:
          GITHUB_WALLPAPER_VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [ "${{ matrix.container }}" != "none" ]; then
            python3.11 scripts/build_release.py --output-dir publish
          else
            python scripts/build_release.py --output-dir publish
          fi

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: python/publish/
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: release-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          VERSION="2.0.${GITHUB_RUN_NUMBER}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release
          find artifacts -name 'GitHubWallpaper.exe' -exec cp {} release/ \;
          find artifacts -name 'GitHubWallpaper' -not -path '*/GitHubWallpaper/*' -exec cp {} release/ \;
          find artifacts -name 'GitHubWallpaper-Win-x64.zip' -exec cp {} release/ \;
          find artifacts -name 'GitHubWallpaper-linux-x64.tar.gz' -exec cp {} release/ \;
          cat > release/version.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "publishedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "releaseTag": "latest",
            "windowsDownloadUrl": "https://github.com/rkfsociety/GitHubWallpaper/releases/download/latest/GitHubWallpaper.exe",
            "windowsRuntimeUrl": "https://github.com/rkfsociety/GitHubWallpaper/releases/download/latest/GitHubWallpaper-Win-x64.zip",
            "linuxDownloadUrl": "https://github.com/rkfsociety/GitHubWallpaper/releases/download/latest/GitHubWallpaper",
            "linuxRuntimeUrl": "https://github.com/rkfsociety/GitHubWallpaper/releases/download/latest/GitHubWallpaper-linux-x64.tar.gz"
          }
          EOF

      - name: Recreate latest release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          TAG="latest"
          SHA="${{ github.sha }}"
          VERSION="${{ steps.version.outputs.version }}"
          SHORT_SHA="${SHA:0:7}"
          NOTES=$(cat <<EOF
          ## GitHubWallpaper

          Сборка **${VERSION}** (${SHORT_SHA}).

          - Windows: \`GitHubWallpaper.exe\` — скачайте и запустите; компоненты (~150 МБ) установятся в \`%APPDATA%\\GitHubWallpaper\\\`
          - Linux: \`GitHubWallpaper\` — скачайте и запустите; компоненты установятся в \`~/.config/GitHubWallpaper/\` (glibc 2.31+, Debian 11 / Ubuntu 20.04+)
          - Архивы \`GitHubWallpaper-*-x64.*\` — runtime для автоустановки и обновлений

          Python / PySide6 · Qt WebEngine.
          EOF
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Deleting release $TAG before recreate"
            gh release delete "$TAG" --yes --cleanup-tag
          fi

          RELEASE_ASSETS=(release/version.json)
          for candidate in \
            release/GitHubWallpaper.exe \
            release/GitHubWallpaper \
            release/GitHubWallpaper-Win-x64.zip \
            release/GitHubWallpaper-linux-x64.tar.gz
          do
            if [ -f "$candidate" ]; then
              RELEASE_ASSETS+=("$candidate")
            fi
          done

          gh release create "$TAG" \
            "${RELEASE_ASSETS[@]}" \
            --target "$SHA" \
            --title "GitHubWallpaper ${VERSION}" \
            --notes "$NOTES" \
            --latest

          for OLD_TAG in v2.0-beta; do
            if gh release view "$OLD_TAG" >/dev/null 2>&1; then
              echo "Removing obsolete release $OLD_TAG"
              gh release delete "$OLD_TAG" --yes --cleanup-tag
            fi
          done

          OLD_TAGS=$(gh release list --limit 100 --json tagName -q '.[].tagName' | grep -E '^v1\.0\.[0-9]+$' || true)
          for OLD_TAG in $OLD_TAGS; do
            echo "Removing old v1 release $OLD_TAG"
            gh release delete "$OLD_TAG" --yes --cleanup-tag
          done
